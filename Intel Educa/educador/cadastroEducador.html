<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Intel Educa</title>
  <link rel="stylesheet" href="styles/style.css"/>
  <style>
    /* Header */
    .header {
      background-color: #0f172a;
      color: white;
      padding: 1.2rem 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .logo span {
      color: #facc15;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 2rem;
      margin: 0;
      padding: 0;
    }

    .nav-list a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .nav-list a:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .nav-list .btn {
      background-color: #facc15;
      color: #0f172a;
      font-weight: bold;
    }

    .nav-list .btn:hover {
      background-color: #eab308;
    }

    /* Body background */
    body {
      background-color: #e2e8f0;
      margin: 0;
      font-family: sans-serif;
    }

    /* Login Container */
    .login-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background-color: #fffdf4;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 1.5rem;
      color: #0f172a;
    }

    .login-container form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-container input,
    .login-container select {
      padding: 0.75rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }

    .btn-primary {
      background-color: #0f172a;
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #1e293b;
    }

    .login-container p {
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .login-container a {
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
    }

    .login-container a:hover {
      text-decoration: underline;
    }



    /* Título principal */
    h1 {
      text-align: center;
      color: #0f172a;
      margin-top: 2rem;
      font-size: 2rem;
    }


    #cadastrar{
      color: white;
      text-decoration: none;
    }

    input{
      margin-bottom: 20px;
    }

  </style>
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="logo">Intel<span>Educa</span></div>
      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../estudante/login-estudante.html">Login Estudante</a></li>
          <li><a href="login-educador.html">Login Educador</a></li>
          <li><a href="cadastroEducador.html" class="btn">Cadastre-se</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <h1>Cadastro do Educador</h1>

  <div class="login-container">
    <h2>Crie sua Conta</h2>
    <form>
      <input type="text" placeholder="Nome completo" required />
      <input type="email" placeholder="E-mail" required />
      <input type="text" placeholder="Faculdade" required />
      <input type="password" placeholder="Senha" required />
      <center><a href="../educador/login-educador.html" class="btn-primary" id="cadastrar">Cadastrar</a></center>
    </form>
    <p>Você é um estudante? <a href="../estudante/cadastroAluno.html">Cadastra-se aqui</a></p>
  </div>

</body>
</html>
