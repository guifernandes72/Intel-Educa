<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assistir Live | Intel Educa</title>
  <style>
    :root {
      --azul1: #0d47a1;
      --azul2: #2196f3;
      --cinza: #f0f0f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: var(--cinza);
    }

    header {
      background: linear-gradient(to right, var(--azul1), var(--azul2));
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 30px;
    }

    .video-view {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    video {
      width: 100%;
      border-radius: 10px;
      background-color: black;
    }

    .chat-section {
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 8px;
      height: 350px;
    }

    .chat-input {
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .chat-input button {
      background-color: var(--azul1);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎥 Assistindo Live</div>
    <a href="painelEstudante.html"><button class="chat-input button">Voltar</button></a>
  </header>

  <div class="container">
    <div class="video-view">
      <h3>📡 Ao Vivo com o Professor</h3>
      <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <div class="chat-section">
      <h3>💬 Chat da Live</h3>
      <div class="chat-messages" id="chatBox"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Escreva sua mensagem..." />
        <button onclick="enviarMensagem()">Enviar</button>
      </div>
    </div>
  </div>

  <div class="footer">© 2025 Intel Educa. Todos os direitos reservados.</div>

  <script>
    // Simulação de chat local
    function enviarMensagem() {
      const input = document.getElementById("chatInput");
      const chat = document.getElementById("chatBox");
      const texto = input.value.trim();
      if (texto !== '') {
        const msg = document.createElement("div");
        msg.textContent = `Você: ${texto}`;
        msg.style.marginBottom = '8px';
        chat.appendChild(msg);
        input.value = '';
        chat.scrollTop = chat.scrollHeight;
      }
    }

    // Simulação do vídeo remoto com uma gravação (substituir por WebRTC depois)
    const remoteVideo = document.getElementById('remoteVideo');

    // Para testes: usar um vídeo demo como se fosse a live
    remoteVideo.src = 'https://www.w3schools.com/html/mov_bbb.mp4'; // Você pode usar stream real aqui futuramente

    // Em produção: conectar o remoteVideo.srcObject = stream via WebRTC
  </script>

</body>
</html>
