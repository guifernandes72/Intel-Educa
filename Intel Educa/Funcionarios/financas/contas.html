<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contas a Pagar - Intel Educa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background-color: #f4f9ff;
    }

    .sidebar {
      width: 240px;
      background-color: #08314e;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 22px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      padding: 10px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background-color: #18496d;
    }

    .content {
      flex-grow: 1;
      padding: 30px;
    }

    h1 {
      color: #083352;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"] {
      flex: 1;
      min-width: 150px;
    }

    button {
      background-color: #043152;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #053557;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ccc;
    }

    tr.vencida {
      background-color: #ffe5e5;
    }

    tr.proxima {
      background-color: #fffbdc;
    }

    .paga {
      text-decoration: line-through;
      color: gray;
    }

    .acoes button {
      background-color: #f44336;
      margin-left: 5px;
    }

    .acoes button:hover {
      background-color: #d32f2f;
    }

    .acoes .pagar {
      background-color: #4CAF50;
    }

    .acoes .pagar:hover {
      background-color: #388E3C;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Intel Educa</h2>
    <ul>
        <li><a href="contas.html">📆 Contas a Pagar</a></li>
        <li><a href="financas.html">📥 Resumo Financeiro</a></li>
        <li><a href="#">📊 Relatórios</a></li>
        <li><a href="#">💳 Folha de Pagamento</a></li>
        <li><a href="#">📈 Planejamento</a></li>
        <li><a href="#">🧾 Orçamentos</a></li>
        <li><a href="#">🔐 Auditorias</a></li>
      </ul>
  </div>

  <div class="content">
    <h1>Contas a Pagar</h1>

    <form id="form-conta">
      <input type="text" id="descricao" placeholder="Descrição" required>
      <input type="date" id="vencimento" required>
      <input type="number" id="valor" placeholder="Valor (R$)" required step="0.01">
      <button type="submit">Adicionar</button>
    </form>

    <table id="tabela-contas">
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Vencimento</th>
          <th>Valor (R$)</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById("form-conta");
    const tabela = document.querySelector("#tabela-contas tbody");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const descricao = document.getElementById("descricao").value;
      const vencimento = document.getElementById("vencimento").value;
      const valor = parseFloat(document.getElementById("valor").value).toFixed(2);

      const tr = document.createElement("tr");

      const hoje = new Date();
      const dataVencimento = new Date(vencimento);
      const diasParaVencer = (dataVencimento - hoje) / (1000 * 60 * 60 * 24);

      if (diasParaVencer < 0) {
        tr.classList.add("vencida");
      } else if (diasParaVencer <= 3) {
        tr.classList.add("proxima");
      }

      tr.innerHTML = `
        <td>${descricao}</td>
        <td>${vencimento}</td>
        <td>R$ ${valor}</td>
        <td class="status">Pendente</td>
        <td class="acoes">
          <button class="pagar">Pagar</button>
          <button class="remover">Remover</button>
        </td>
      `;

      tabela.appendChild(tr);
      form.reset();
    });

    tabela.addEventListener("click", function(e) {
      if (e.target.classList.contains("remover")) {
        e.target.closest("tr").remove();
      } else if (e.target.classList.contains("pagar")) {
        const row = e.target.closest("tr");
        row.classList.add("paga");
        row.querySelector(".status").textContent = "Pago";
      }
    });
  </script>

</body>
</html>
