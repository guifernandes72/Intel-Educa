<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RH - Intel Educa</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f2f6ff;
    }

    header {
      background-color: #2c3eaf;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 1.6em;
      font-weight: bold;
    }

    header a {
      color: white;
      text-decoration: none;
      font-size: 1em;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2c3eaf;
    }

    input, select, button {
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
    }

    button {
      background-color: #2c3eaf;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #1d2f8a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #e3e8ff;
    }

    .alerta {
      background-color: #ffe6e6;
      color: #cc0000;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📘 Intel Educa RH</div>
    <a href="dashboard-estudante.html">Voltar ao Painel</a>
  </header>

  <div class="container">
    <h2>Cadastro de Funcionários</h2>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="cargo" placeholder="Cargo (ex: Professor, Psicopedagogo)">
    <input type="email" id="email" placeholder="E-mail institucional">
    <select id="avaliacao">
      <option value="Excelente">Excelente</option>
      <option value="Bom">Bom</option>
      <option value="Regular">Regular</option>
      <option value="Precisa Melhorar">Precisa Melhorar</option>
    </select>
    <button onclick="cadastrarFuncionario()">Cadastrar Funcionário</button>

    <div id="alertaDesempenho" class="alerta" style="display: none;"></div>

    <h2>Colaboradores Cadastrados</h2>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Cargo</th>
          <th>Email</th>
          <th>Avaliação</th>
        </tr>
      </thead>
      <tbody id="tabelaFuncionarios"></tbody>
    </table>
  </div>

  <script>
    function cadastrarFuncionario() {
      const nome = document.getElementById("nome").value;
      const cargo = document.getElementById("cargo").value;
      const email = document.getElementById("email").value;
      const avaliacao = document.getElementById("avaliacao").value;
      const alerta = document.getElementById("alertaDesempenho");

      if (!nome || !cargo || !email) {
        alert("Preencha todos os campos!");
        return;
      }

      const tabela = document.getElementById("tabelaFuncionarios");
      const novaLinha = tabela.insertRow();

      novaLinha.innerHTML = `
        <td>${nome}</td>
        <td>${cargo}</td>
        <td>${email}</td>
        <td>${avaliacao}</td>
      `;

      if (avaliacao === "Precisa Melhorar") {
        alerta.textContent = `⚠️ Atenção: ${nome} precisa de acompanhamento ou treinamento adicional.`;
        alerta.style.display = "block";
      } else {
        alerta.style.display = "none";
      }

      // Limpar campos
      document.getElementById("nome").value = "";
      document.getElementById("cargo").value = "";
      document.getElementById("email").value = "";
    }
  </script>
</body>
</html>
